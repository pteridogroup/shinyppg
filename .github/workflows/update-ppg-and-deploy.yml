name: Update PPG data and deploy app

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Check latest PPG release
        id: check
        run: |
          latest_tag=$(curl -sS -H "Authorization: token ${GITHUB_TOKEN}" \
            https://api.github.com/repos/pteridogroup/ppg/releases/latest \
            | grep '"tag_name"' | sed -E 's/.*"tag_name": *"v?([^"]+)".*/\1/')
          current_version=$(grep 'ppg_version <-' data-raw/ppg_version.R \
            | sed -E 's/.*"([^"]+)".*/\1/')

          echo "Latest PPG release: $latest_tag"
          echo "Current PPG version: $current_version"

          if [ -z "$latest_tag" ]; then
            echo "Could not determine latest PPG release" >&2
            exit 1
          fi

          if [ "$latest_tag" != "$current_version" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi
          echo "new_version=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Set up R
        if: steps.check.outputs.updated == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install dependencies
        if: steps.check.outputs.updated == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rsconnect
            any::devtools
            any::usethis
          cache: true

      - name: Update PPG version and regenerate data
        if: steps.check.outputs.updated == 'true'
        run: |
          sed -i -E 's/ppg_version <- "[^"]+"/ppg_version <- "${{ steps.check.outputs.new_version }}"/' \
            data-raw/ppg_version.R
          Rscript data-raw/ppg_version.R
          Rscript data-raw/ppg_full.R

      - name: Commit and push updated data
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-raw/ppg_version.R data/ppg_version.rda data/ppg_full.rda
          git commit -m "Update to PPG v${{ steps.check.outputs.new_version }}"
          git push

      - name: Deploy app to shinyapps.io
        if: steps.check.outputs.updated == 'true'
        env:
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e '
            rsconnect::setAccountInfo(
              name = "pteridogroup",
              token = Sys.getenv("SHINYAPPS_TOKEN"),
              secret = Sys.getenv("SHINYAPPS_SECRET")
            )
            rsconnect::deployApp(
              appName = "shinyppg",
              account = "pteridogroup",
              server = "shinyapps.io",
              forceUpdate = TRUE
            )
          '
